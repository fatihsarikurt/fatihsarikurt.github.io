title: Fatih S. Sarikurt
email: fatihsarikurt@gmail.com
description: >-
  Principal Engineer in Thermal Hydraulics with expertise in high-fidelity CFD applications,
  multiphysics, and multiscale modeling of nuclear reactor systems.
twitter_username: 
github_username: 
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Fatih S. Sarikurt"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Principal Engineer in Thermal Hydraulics with expertise in high-fidelity CFD applications, multiphysics, and multiscale modeling of nuclear reactor systems."
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/fatih-sinan-sarikurt"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:fatihsarikurt@gmail.com"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/fatih-sinan-sarikurt"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/